<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>송지훈 · 비전에셋</title>
  <meta property="og:title" content="송지훈 · 매니저 · 비전에셋">
  <meta property="og:description" content="자산을 관리하는 것이 아니라, 성장시키는 파트너">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap");

    :root {
      --gold: #c8a96e;
      --gold-light: #e8cc9a;
      --gold-dim: rgba(200,169,110,0.18);
      --navy: #060c18;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      height:100%;
      background: var(--navy);
      font-family:"Noto Sans KR",-apple-system,BlinkMacSystemFont,sans-serif;
      overflow-x:hidden;
    }
    body { display:flex; align-items:center; justify-content:center; padding: 16px 16px; }

    #bg-canvas { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:0; }

    .card-wrapper {
      position:relative; z-index:1;
      width:100%; max-width:400px;
      opacity:0; transform:translateY(30px);
      animation:wrapperIn 1s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    @keyframes wrapperIn { to { opacity:1; transform:translateY(0); } }

    .card {
      width:100%;
      border-radius:28px;
      border:1px solid rgba(200,169,110,0.15);
      overflow:hidden; position:relative;
      display:flex; flex-direction:column;
      background: linear-gradient(160deg,
        rgba(12,22,44,0.98) 0%,
        rgba(8,14,28,0.99) 50%,
        rgba(10,18,36,0.98) 100%);
    }

    .card-aura {
      position:absolute; inset:-2px;
      border-radius:30px;
      background: conic-gradient(
        from 0deg,
        transparent 0%, rgba(200,169,110,0.4) 15%,
        transparent 30%, transparent 70%,
        rgba(200,169,110,0.3) 85%, transparent 100%
      );
      animation: auraSpin 6s linear infinite;
      z-index:-1; pointer-events:none;
    }
    @keyframes auraSpin { to { transform:rotate(360deg); } }

    .card-gloss {
      position:absolute; inset:0; border-radius:28px; pointer-events:none; z-index:10;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.04) 0%, transparent 40%,
        transparent 60%, rgba(200,169,110,0.03) 100%);
    }

    .light-beam {
      position:absolute; top:0; left:50%; transform:translateX(-50%);
      width:280px; height:200px; pointer-events:none; z-index:1;
      background: radial-gradient(ellipse at 50% 0%, rgba(200,169,110,0.12) 0%, transparent 70%);
      animation: beamPulse 4s ease-in-out infinite;
    }
    @keyframes beamPulse {
      0%,100% { opacity:0.6; transform:translateX(-50%) scaleX(1); }
      50%      { opacity:1;   transform:translateX(-50%) scaleX(1.15); }
    }

    .corner { position:absolute; width:24px; height:24px; pointer-events:none; z-index:5; }
    .corner::before, .corner::after { content:""; position:absolute; background:var(--gold); opacity:0.7; }
    .corner-tl { top:14px; left:14px; }
    .corner-tl::before { top:0; left:0; width:2px; height:100%; }
    .corner-tl::after  { top:0; left:0; width:100%; height:2px; }
    .corner-tr { top:14px; right:14px; }
    .corner-tr::before { top:0; right:0; width:2px; height:100%; }
    .corner-tr::after  { top:0; right:0; width:100%; height:2px; }
    .corner-bl { bottom:14px; left:14px; }
    .corner-bl::before { bottom:0; left:0; width:2px; height:100%; }
    .corner-bl::after  { bottom:0; left:0; width:100%; height:2px; }
    .corner-br { bottom:14px; right:14px; }
    .corner-br::before { bottom:0; right:0; width:2px; height:100%; }
    .corner-br::after  { bottom:0; right:0; width:100%; height:2px; }
    .corner { animation: cornerGlow 3s ease-in-out infinite; }
    .corner-tr { animation-delay:0.75s; }
    .corner-bl { animation-delay:1.5s; }
    .corner-br { animation-delay:2.25s; }
    @keyframes cornerGlow { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

    .card-cover { position:relative; z-index:2; padding:24px 22px 0; flex-shrink:0; }

    .logo-badge {
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 13px 6px 10px;
      border-radius:8px;
      border:0.5px solid rgba(200,169,110,0.4);
      background:rgba(200,169,110,0.06);
      margin-bottom:18px;
      opacity:0; transform:translateX(-16px);
      animation:slideInLeft 0.7s cubic-bezier(0.22,1,0.36,1) 0.6s forwards;
      position:relative; overflow:hidden;
    }
    .logo-badge::after {
      content:""; position:absolute; top:0; left:-100%; width:60%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(200,169,110,0.2),transparent);
      animation:badgeSheen 3.5s ease-in-out 1.5s infinite;
    }
    @keyframes badgeSheen { to { left:200%; } }
    @keyframes slideInLeft { to { opacity:1; transform:translateX(0); } }
    .logo-main { font-size:11px; font-weight:700; color:var(--gold); letter-spacing:0.14em; }
    .logo-sep  { width:0.5px; height:14px; background:rgba(200,169,110,0.3); }
    .logo-sub  { font-size:9px; color:rgba(180,200,230,0.4); letter-spacing:0.12em; }

    .profile-row {
      display:flex; align-items:center; gap:18px; margin-bottom:16px;
      opacity:0; transform:translateY(16px);
      animation:fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.75s forwards;
    }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    .profile-img-wrap { position:relative; flex-shrink:0; width:72px; height:72px; }
    .profile-img {
      width:72px; height:72px; border-radius:50%;
      object-fit:cover; object-position:center top;
      display:block; border:2px solid rgba(200,169,110,0.7);
      position:relative; z-index:2;
    }
    .ring {
      position:absolute; border-radius:50%;
      border:1px solid rgba(200,169,110,0.22);
      top:50%; left:50%; transform:translate(-50%,-50%);
      pointer-events:none;
    }
    .ring-1 { width:88px;  height:88px;  animation:ringExpand 3s ease-in-out infinite; }
    .ring-2 { width:104px; height:104px; animation:ringExpand 3s ease-in-out 1s infinite; border-color:rgba(200,169,110,0.12); }
    @keyframes ringExpand {
      0%   { opacity:0;   transform:translate(-50%,-50%) scale(0.9); }
      30%  { opacity:0.8; }
      100% { opacity:0;   transform:translate(-50%,-50%) scale(1.15); }
    }

    .name {
      font-size:24px; font-weight:700; color:#edf0f7;
      letter-spacing:-0.01em; margin-bottom:3px;
      background:linear-gradient(135deg,#edf0f7 60%,#c8a96e);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .job-title { font-size:12px; color:#6878a0; letter-spacing:0.03em; margin-bottom:4px; }
    .cert-line {
      font-size:10px; color:rgba(180,200,230,0.4);
      font-weight:300; line-height:1.6;
    }

    .tagline-wrap {
      opacity:0; transform:translateY(12px);
      animation:fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 1s forwards;
      margin-bottom: 0;
    }
    .tagline {
      font-size:13px; font-weight:500; color:#b8ccdf;
      line-height:1.75; padding:12px 16px;
      background:rgba(8,16,36,0.6);
      border-left:2px solid var(--gold);
      border-radius:0 10px 10px 0;
      position:relative; overflow:hidden;
    }
    .tagline::before {
      content:""; position:absolute; inset:0;
      background:linear-gradient(90deg,rgba(200,169,110,0.06),transparent);
      pointer-events:none;
    }

    .gold-line {
      height:1px; margin:14px 22px; flex-shrink:0;
      position:relative; overflow:hidden;
    }
    .gold-line::before {
      content:""; position:absolute; inset:0;
      background:linear-gradient(90deg,transparent,rgba(200,169,110,0.5) 40%,rgba(200,169,110,0.5) 60%,transparent);
    }
    .gold-line::after {
      content:""; position:absolute; top:0; left:-60%;
      width:40%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,220,140,0.9),transparent);
      animation:lineShimmer 3s ease-in-out 1.5s infinite;
    }
    @keyframes lineShimmer { to { left:120%; } }

    .card-body {
      padding:6px 22px 22px;
      position:relative; z-index:2;
      flex:1; display:flex; flex-direction:column; gap:8px;
    }

    .contact-item {
      display:flex; align-items:center; gap:13px;
      text-decoration:none; padding:11px 12px;
      border-radius:14px;
      background:rgba(255,255,255,0.025);
      border:0.5px solid rgba(255,255,255,0.06);
      transition:all 0.25s ease;
      position:relative; overflow:hidden;
      opacity:0; transform:translateX(-20px);
    }
    .contact-item:nth-child(1){ animation:slideInLeft 0.6s cubic-bezier(0.22,1,0.36,1) 1.1s forwards; }
    .contact-item:nth-child(2){ animation:slideInLeft 0.6s cubic-bezier(0.22,1,0.36,1) 1.2s forwards; }
    .contact-item:active {
      background:rgba(200,169,110,0.07);
      border-color:rgba(200,169,110,0.3);
      transform:scale(0.985);
    }

    .domain-badge {
      display:flex; align-items:center; gap:13px;
      text-decoration:none; padding:11px 12px;
      border-radius:14px;
      background:rgba(200,169,110,0.04);
      border:0.5px solid rgba(200,169,110,0.25);
      transition:all 0.25s ease;
      position:relative; overflow:hidden;
      opacity:0; transform:translateX(-20px);
      animation:slideInLeft 0.6s cubic-bezier(0.22,1,0.36,1) 1.3s forwards;
    }
    .domain-badge::after {
      content:""; position:absolute; top:0; left:-100%; width:50%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(200,169,110,0.12),transparent);
      animation:badgeSheen 4s ease-in-out 2s infinite;
    }
    .domain-badge:active { background:rgba(200,169,110,0.1); transform:scale(0.985); }

    .icon-wrap {
      width:38px; height:38px; border-radius:11px;
      background:rgba(8,18,36,0.8);
      border:0.5px solid rgba(200,169,110,0.22);
      display:flex; align-items:center; justify-content:center;
      font-size:16px; flex-shrink:0;
    }
    .contact-value { font-size:13px; color:#a8c0d8; }
    .contact-label { font-size:10px; color:rgba(168,192,216,0.4); margin-top:2px; }
    .domain-text   { font-size:12px; color:var(--gold); letter-spacing:0.03em; }
    .domain-sub    { font-size:10px; color:rgba(200,169,110,0.45); margin-top:2px; }

    .biz-section {
      margin-top:2px;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,0.015);
      border:0.5px solid rgba(255,255,255,0.05);
      opacity:0; transform:translateX(-20px);
      animation:slideInLeft 0.6s cubic-bezier(0.22,1,0.36,1) 1.4s forwards;
    }
    .biz-row {
      display:flex; align-items:flex-start; gap:10px;
      margin-bottom:8px;
    }
    .biz-row:last-child { margin-bottom:0; }
    .biz-icon {
      width:32px; height:32px; border-radius:9px;
      background:rgba(8,18,36,0.8);
      border:0.5px solid rgba(200,169,110,0.15);
      display:flex; align-items:center; justify-content:center;
      font-size:14px; flex-shrink:0;
    }
    .biz-label { font-size:10px; color:rgba(168,192,216,0.4); margin-bottom:2px; }
    .biz-value { font-size:12px; color:#8aa0b8; line-height:1.5; }

    .save-btn {
      width:100%;
      background:linear-gradient(135deg,rgba(200,169,110,0.12),rgba(200,169,110,0.06));
      border:0.5px solid rgba(200,169,110,0.45);
      border-radius:14px; color:var(--gold);
      font-size:14px; padding:14px;
      margin-top:4px; cursor:pointer;
      font-family:inherit; font-weight:500;
      display:flex; align-items:center; justify-content:center; gap:8px;
      position:relative; overflow:hidden;
      transition:all 0.25s ease;
      opacity:0; animation:fadeUp 0.6s ease 1.5s forwards;
      letter-spacing:0.03em;
    }
    .save-btn::before {
      content:""; position:absolute; top:0; left:-100%; width:50%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(200,169,110,0.15),transparent);
      animation:badgeSheen 3s ease-in-out 2s infinite;
    }
    .save-btn:active { transform:scale(0.97); background:rgba(200,169,110,0.18); }

    /* ── 티커 테이프 ── */
    .ticker-wrap {
      width:100%; overflow:hidden;
      background:rgba(8,14,28,0.9);
      border-bottom:1px solid rgba(200,169,110,0.2);
      padding:7px 0;
      position:relative; z-index:3;
    }
    .ticker-wrap::before, .ticker-wrap::after {
      content:""; position:absolute; top:0; bottom:0; width:28px; z-index:4;
      pointer-events:none;
    }
    .ticker-wrap::before { left:0;  background:linear-gradient(to right, rgba(8,14,28,0.95), transparent); }
    .ticker-wrap::after  { right:0; background:linear-gradient(to left,  rgba(8,14,28,0.95), transparent); }
    .ticker-track {
      display:flex; width:max-content;
      animation: tickerScroll 28s linear infinite;
    }
    .ticker-track:hover { animation-play-state:paused; }
    @keyframes tickerScroll {
      0%   { transform:translateX(0); }
      100% { transform:translateX(-50%); }
    }
    .ticker-item {
      display:inline-flex; align-items:center; gap:6px;
      padding:0 22px; white-space:nowrap;
    }
    .ticker-symbol {
      font-size:10px; font-weight:700; color:var(--gold);
      letter-spacing:0.08em;
    }
    .ticker-price {
      font-size:10px; color:#a8c0d8;
    }
    .ticker-change { font-size:10px; font-weight:600; }
    .ticker-change.up   { color:#4ade80; }
    .ticker-change.down { color:#f87171; }
    .ticker-sep {
      width:1px; height:12px; background:rgba(200,169,110,0.2);
      margin:0 4px;
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="card-wrapper">
  <div class="card-aura"></div>
  <div class="card">
    <div class="card-gloss"></div>
    <div class="light-beam"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- 티커 테이프 -->
    <div class="ticker-wrap">
      <div class="ticker-track" id="tickerTrack">
        <!-- JS로 채움 -->
      </div>
    </div>

    <div class="card-cover">
      <div class="logo-badge">
        <div class="logo-main">VISION ASSET</div>
        <div class="logo-sep"></div>
        <span class="logo-sub">MANAGER</span>
      </div>

<script>
  // ── 티커 테이프 데이터 & 렌더 ──
  const TICKERS = [
    { symbol:"KOSPI",   id:"kospi" },
    { symbol:"NASDAQ",  id:"nasdaq"},
    { symbol:"삼성전자", id:"samsung"},
    { symbol:"BTC/KRW", id:"btc"   },
  ];

  // 더미 시세 (실제 서비스 시 API 연동 가능)
  const DUMMY = {
    kospi:   { price:"2,624.31", change:"+12.45", pct:"+0.48%", up:true  },
    nasdaq:  { price:"17,754.82",change:"-38.20", pct:"-0.21%", up:false },
    samsung: { price:"56,200",   change:"+400",   pct:"+0.72%", up:true  },
    btc:     { price:"₩133,420,000", change:"+1,250,000", pct:"+0.95%", up:true },
  };

  function buildTicker() {
    const track = document.getElementById("tickerTrack");
    let html = "";
    // 2배 반복으로 이음새 없는 루프
    for (let pass = 0; pass < 2; pass++) {
      TICKERS.forEach(t => {
        const d = DUMMY[t.id];
        const cls = d.up ? "up" : "down";
        const arrow = d.up ? "▲" : "▼";
        html += `
          <span class="ticker-item">
            <span class="ticker-symbol">${t.symbol}</span>
            <span class="ticker-price">${d.price}</span>
            <span class="ticker-change ${cls}">${arrow} ${d.pct}</span>
          </span>
          <span class="ticker-sep"></span>`;
      });
    }
    track.innerHTML = html;
  }
  buildTicker();

  const canvas = document.getElementById("bg-canvas");
  const ctx = canvas.getContext("2d");
  let W, H;
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  resize(); window.addEventListener("resize",resize);
  function rand(a,b){ return Math.random()*(b-a)+a; }
  const stars = Array.from({length:80},()=>({
    x:rand(0,1),y:rand(0,1),r:rand(0.3,1.4),a:rand(0.05,0.35),
    sp:rand(0.008,0.025),ph:rand(0,Math.PI*2)
  }));
  const meteors = Array.from({length:4},()=>({
    active:false,x:0,y:0,len:rand(80,160),speed:rand(6,12),
    angle:Math.PI/4,alpha:0,timer:0,interval:rand(120,300)
  }));
  const orbs=[
    {x:0.15,y:0.2,r:180,color:"rgba(200,140,60,0.04)",speed:0.0003},
    {x:0.85,y:0.7,r:220,color:"rgba(60,100,200,0.04)",speed:0.0004},
    {x:0.5,y:0.5,r:150,color:"rgba(200,169,110,0.03)",speed:0.0005},
  ];
  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H); t+=0.016;
    orbs.forEach(o=>{
      const ox=(o.x+Math.sin(t*o.speed*1000)*0.05)*W;
      const oy=(o.y+Math.cos(t*o.speed*800)*0.05)*H;
      const g=ctx.createRadialGradient(ox,oy,0,ox,oy,o.r);
      g.addColorStop(0,o.color); g.addColorStop(1,"transparent");
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(ox,oy,o.r,0,Math.PI*2); ctx.fill();
    });
    stars.forEach(s=>{
      s.ph+=s.sp;
      const alpha=s.a*(0.5+0.5*Math.sin(s.ph));
      ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,185,150,${alpha})`; ctx.fill();
    });
    meteors.forEach(m=>{
      m.timer++;
      if(!m.active&&m.timer>m.interval){
        m.active=true;m.timer=0;
        m.x=rand(0.1,0.7)*W;m.y=rand(0.0,0.3)*H;
        m.alpha=1;m.interval=rand(200,500);
      }
      if(m.active){
        m.x+=Math.cos(m.angle)*m.speed; m.y+=Math.sin(m.angle)*m.speed;
        m.alpha-=0.018;
        if(m.alpha<=0){m.active=false;return;}
        const ex=m.x-Math.cos(m.angle)*m.len;
        const ey=m.y-Math.sin(m.angle)*m.len;
        const g=ctx.createLinearGradient(ex,ey,m.x,m.y);
        g.addColorStop(0,"transparent");
        g.addColorStop(1,`rgba(220,195,140,${m.alpha*0.8})`);
        ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(m.x,m.y);
        ctx.strokeStyle=g;ctx.lineWidth=1.2;ctx.stroke();
      }
    });
    requestAnimationFrame(draw);
  }
  draw();
